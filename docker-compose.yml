services:
  llm-wiki:
    build: .
    image: llm-wiki:latest
    ports:
      - "8080:8080"   # web UI
      - "8081:8081"   # MCP (streamable-http)
    environment:
      - HOST=0.0.0.0
      # - COOKIE_SECURE=true              # enable when serving behind TLS
      # - EMBEDDING_MODEL=intfloat/multilingual-e5-base
      # - SESSION_SECRET=change-me        # else auto-generated + persisted in the DB
      # - LOG_FILE=/data/llm-wiki.log     # rotating file log (in addition to stderr)
    volumes:
      - ./data:/data        # SQLite DB (metadata, revisions, index, graph, users)
      - ./vault:/vault      # markdown documents
      - hf-models:/models   # embedding-model cache (avoids re-downloading)
    restart: unless-stopped
    # Block in-container privilege escalation (defense in depth).
    security_opt:
      - no-new-privileges:true
    # The image (Dockerfile HEALTHCHECK) also reports health; this surfaces it to
    # compose. /readyz is true only once the model is loaded AND the DB is reachable,
    # so startup grace must cover the first-boot model download.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/readyz',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s
    # Cap memory so an embedding spike can't take down the host. Raise for large
    # models (bge-m3 etc.). On non-Swarm `docker compose`, mem_limit applies.
    mem_limit: 2g
    deploy:
      resources:
        limits:
          memory: 2g
    # Runs as root by default for bind-mount (./data, ./vault) write compatibility.
    # To run non-root, ensure those host dirs are writable by the uid and set e.g.:
    #   user: "1000:1000"

volumes:
  hf-models:
