<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}llm-wiki{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">📚 llm-wiki</a>
  <form class="searchbox" action="/search" method="get">
    <input type="search" name="q" placeholder="검색…" value="{{ q|default('') }}">
  </form>
  <nav>
    {% if user %}
      <a href="/">문서</a>
      <a href="/graph">그래프</a>
      {% if user.can_write %}<a href="/new">새 문서</a>{% endif %}
      <a href="/settings">API 키</a>
      {% if user.can_admin %}<a href="/admin/users">사용자</a>{% endif %}
      <span class="who">{{ user.username }} · {{ user.role }}</span>
      <a href="/logout">로그아웃</a>
    {% endif %}
  </nav>
</header>
{% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
<main>{% block content %}{% endblock %}</main>
</body>
</html>
