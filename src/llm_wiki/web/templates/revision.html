{% extends "base.html" %}
{% block title %}{{ rev.title }} v{{ rev.version }}{% endblock %}
{% block content %}
<h1>{{ rev.title }} <span class="muted">· <span class="version">v{{ rev.version }}</span></span></h1>
<div class="doc-meta">
  {{ rev.op }} · {{ rev.author or '—' }} · {{ rev.created_at|dt }} ·
  <a href="/doc/{{ rev.path|urlpath }}/history">이력으로</a> ·
  <a href="/doc/{{ rev.path|urlpath }}">현재 문서</a>
  {% if user.can_write %}
    · <form method="post" action="/doc/{{ rev.path|urlpath }}/rev/{{ rev.version }}/restore" class="inline"
            data-confirm="이 버전(v{{ rev.version }})으로 되돌릴까요? (새 버전으로 기록됩니다)">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button class="primary">이 버전으로 되돌리기</button>
      </form>
  {% endif %}
</div>
<div class="rendered">{{ html|safe }}</div>
{% endblock %}
