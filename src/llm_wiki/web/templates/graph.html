{% extends "base.html" %}
{% block title %}그래프{% endblock %}
{% block content %}
<h1>링크 그래프</h1>
<div class="graph-controls">
  <label>중심 문서 <input id="root" value="{{ root }}" placeholder="(비우면 전체)" size="36"></label>
  <label>깊이 <input id="depth" type="number" value="1" min="1" max="3"></label>
  <button class="primary" onclick="reloadGraph()">적용</button>
  <span id="ginfo" class="muted" role="status" aria-live="polite"></span>
</div>
<div id="cy"></div>
<p id="gempty" class="muted" hidden>표시할 노드가 없습니다. 중심 문서 경로를 확인하거나, 문서 사이에 <code>[[위키링크]]</code>를 추가해 보세요.</p>
<script src="{{ static('vendor/cytoscape.min.js') }}"></script>
<script>
let cy = null;

// Pull live theme colours from the CSS tokens so the graph tracks light/dark and
// the accent identity instead of hard-coded hex. Re-read on each (re)build and
// whenever the theme flips. Root nodes use ink (+larger), unresolved nodes are
// dashed ghosts, edges follow the line tokens.
function graphStyle() {
  const cs = getComputedStyle(document.documentElement);
  const v = (n, fb) => (cs.getPropertyValue(n).trim() || fb);
  const accent = v('--accent', '#2563eb'), ink = v('--fg', '#1c2128'),
    faint = v('--fg-faint', '#6e7781'), line = v('--line', '#d5dbe2'),
    lineStrong = v('--line-strong', '#c2cad4'), inset = v('--inset', '#e9edf2');
  return [
    { selector: 'node', style: { 'label': 'data(label)', 'font-size': '9px', 'background-color': accent, 'width': 12, 'height': 12, 'color': ink,
        'text-valign': 'bottom', 'text-halign': 'center', 'text-wrap': 'wrap' } },
    { selector: 'node[?root]', style: { 'background-color': ink, 'width': 18, 'height': 18, 'font-size': '11px' } },
    { selector: 'node[!exists]', style: { 'background-color': inset, 'border-width': 1, 'border-style': 'dashed', 'border-color': lineStrong, 'color': faint } },
    { selector: 'edge', style: { 'width': 1, 'line-color': lineStrong, 'target-arrow-color': lineStrong, 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'arrow-scale': 0.6 } },
    { selector: 'edge[!resolved]', style: { 'line-style': 'dashed', 'line-color': line, 'target-arrow-color': line } }
  ];
}

async function reloadGraph() {
  const root = document.getElementById('root').value.trim();
  const depth = document.getElementById('depth').value;
  const info = document.getElementById('ginfo');
  const empty = document.getElementById('gempty');
  info.textContent = '불러오는 중…';
  info.classList.add('is-loading'); info.setAttribute('aria-busy', 'true');
  let url = '/api/graph?depth=' + encodeURIComponent(depth) + '&limit=500';
  if (root) url += '&root=' + encodeURIComponent(root);
  let data;
  try {
    data = await (await fetch(url)).json();
  } catch (e) {
    info.classList.remove('is-loading'); info.removeAttribute('aria-busy');
    info.textContent = '그래프를 불러오지 못했습니다.';
    return;
  }
  empty.hidden = data.nodes.length > 0;
  info.classList.remove('is-loading'); info.removeAttribute('aria-busy');
  info.textContent =
    data.nodes.length + ' 노드 / ' + data.edges.length + ' 엣지' + (data.truncated ? ' (일부 생략됨)' : '');
  const els = [];
  for (const n of data.nodes) els.push({ data: { id: n.id, label: n.label, exists: n.exists, root: n.is_root } });
  for (const e of data.edges) els.push({ data: { id: e.id, source: e.source, target: e.target, resolved: e.resolved } });
  if (cy) cy.destroy();
  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: els,
    style: graphStyle(),
    minZoom: 0.1,
    maxZoom: 8
  });
  cy.on('tap', 'node', evt => { if (evt.target.data('exists')) location.href = '/doc/' + encodeURIComponent(evt.target.data('id')); });
  // Size the nodes to their real (target) size up-front so cose's overlap-avoidance
  // spaces them for how big they'll actually render — not the 12px style default — and
  // spread them well apart (edge length / repulsion scale with node size, so dense
  // graphs don't pile up). Then fit + re-size on layout stop (see fitAndSize).
  const m = nodeMetrics();
  applyNodeSizes(1, m);
  const layout = cy.layout({ name: 'cose', animate: false, fit: false,
    idealEdgeLength: Math.round(m.nodePx * 2.8), nodeRepulsion: 24000,
    nodeOverlap: Math.round(m.nodePx * 1.2), gravity: 0.3,
    componentSpacing: Math.round(m.nodePx * 3), padding: 30 });
  layout.one('layoutstop', fitAndSize);
  layout.run();
}

// Target on-screen sizes (px) derived from the node count: bigger when the graph is
// sparse (so a few nodes fill the canvas), smaller when dense (to reduce crowding).
function nodeMetrics() {
  const n = Math.max(1, cy.nodes().length);
  const nodePx = Math.max(18, Math.min(64, 150 / Math.sqrt(n)));
  return { nodePx: nodePx, rootPx: nodePx * 1.5,
           fontPx: Math.max(12, Math.min(22, Math.round(nodePx * 0.42))) };
}

// Cytoscape node + label sizes are model units, so they scale with zoom. Set each
// node's model size = target px ÷ zoom so the *rendered* node, label and below-node
// gap stay a constant, legible size regardless of the fit zoom. Labels sit below the
// node (set in graphStyle) and wrap at ~2.4× the node width so long titles stack
// instead of running across neighbours.
function applyNodeSizes(z, m) {
  cy.batch(function () {
    cy.nodes().forEach(function (node) {
      const d = (node.data('root') ? m.rootPx : m.nodePx) / z;
      node.style({ 'width': d, 'height': d, 'font-size': (m.fontPx / z) + 'px',
        'text-margin-y': (4 / z), 'text-max-width': (m.nodePx * 2.4 / z) + 'px' });
    });
  });
}

// After the layout: re-measure the container (the app-shell grid can settle after cy
// init, else fit() centres on stale dimensions and the graph drifts off-centre), fit
// to fill the canvas, then re-apply sizes for the resulting zoom.
function fitAndSize() {
  if (!cy || cy.nodes().empty()) return;
  cy.resize();
  const m = nodeMetrics();
  cy.fit(cy.elements(), Math.round(m.rootPx * 0.5 + m.fontPx + 14));
  applyNodeSizes(cy.zoom() || 1, m);
}

// Recolour (not rebuild) on theme change — data-theme toggle or OS scheme — so
// dark mode is honoured live without losing the current layout.
function applyGraphTheme() { if (cy) cy.style(graphStyle()); }
new MutationObserver(applyGraphTheme).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
if (window.matchMedia) {
  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  if (mq.addEventListener) mq.addEventListener('change', applyGraphTheme);
  else if (mq.addListener) mq.addListener(applyGraphTheme);
}

// Enter in the root/depth fields applies the graph (keyboard parity with the button).
['root', 'depth'].forEach(function (id) {
  document.getElementById(id).addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); reloadGraph(); }
  });
});
reloadGraph();
</script>
{% endblock %}
