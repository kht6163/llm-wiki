{% extends "base.html" %}
{% block title %}로그인{% endblock %}
{% block content %}
<div class="login">
  <div class="login-brand">llm-wiki</div>
  <h1>로그인</h1>
  {% if error %}<div class="error" id="login-error" role="alert">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>아이디 <input name="username" autofocus required
      {% if error %}aria-invalid="true" aria-describedby="login-error"{% endif %}></label>
    <label>비밀번호 <input name="password" type="password" required
      {% if error %}aria-invalid="true" aria-describedby="login-error"{% endif %}></label>
    <button type="submit">로그인</button>
  </form>
  {% if oidc_enabled %}
  <div class="login-sso">
    <div class="login-sso-divider" role="separator"><span>또는</span></div>
    <a class="login-sso-btn" href="/auth/oidc/login">SSO로 로그인</a>
  </div>
  {% endif %}
</div>
{% endblock %}
