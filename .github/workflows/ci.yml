name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      # The test suite downloads a small sentence-transformers model once; cache it
      # so subsequent runs are fast and resilient to HF hiccups.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-all-MiniLM-L6-v2

      - name: Install dependencies
        run: uv sync --locked

      - name: Audit Python dependencies
        # The project itself is editable and torch comes from the explicit CPU index;
        # audit all PyPI-resolvable dependencies and let the container/SBOM scan cover the rest.
        run: uv run pip-audit --skip-editable

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src/llm_wiki

      - name: MCP HTTP transport integration
        run: uv run pytest -q tests/test_mcp_http_transport.py

      - name: Tests
        run: >-
          uv run pytest --ignore=tests/test_mcp_http_transport.py
          --cov=llm_wiki --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Frontend coverage
        run: npm run coverage

      - name: Rebuild vendored assets
        run: npm run build

      - name: Verify generated assets are committed
        working-directory: .
        run: git diff --exit-code -- src/llm_wiki/web/static/vendor

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked frontend dependencies
        run: npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12
        working-directory: .

      - name: Install locked Python dependencies
        run: uv sync --locked
        working-directory: .

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Browser fixture tests
        run: npm run e2e:unit

      - name: Python browser fixture tests
        run: uv run pytest frontend/e2e/test_server.py -q
        working-directory: .

      - name: Browser critical flows
        run: npm run e2e

      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-failure-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

  distribution:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Verify lockfile freshness
        run: uv lock --check

      - name: Build wheel and source distribution
        run: |
          rm -rf dist
          uv build

      - name: Install wheel in a clean environment
        run: |
          uv venv --python 3.12 .wheel-smoke
          uv pip install --python .wheel-smoke/bin/python --torch-backend cpu dist/*.whl

      - name: Verify installed CLI, version, and web assets
        run: |
          .wheel-smoke/bin/python scripts/distribution_smoke.py \
            --expected-version "$(uv version --short)" \
            --source-package src/llm_wiki \
            --sdist dist/*.tar.gz

      - name: Upload verified distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: llm-wiki:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for fixable high-severity vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: llm-wiki:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Start image and require liveness
        timeout-minutes: 5
        run: python3 scripts/docker_smoke.py llm-wiki:ci

      - name: Capture logs and remove smoke container
        if: always()
        run: |
          docker logs llm-wiki-ci-smoke 2>/dev/null || true
          docker rm --force --volumes llm-wiki-ci-smoke 2>/dev/null || true

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
